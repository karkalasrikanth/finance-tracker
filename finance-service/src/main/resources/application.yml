spring:
  application:
    name: finance-service
  datasource:
    url: jdbc:postgresql://${DB_HOST_NAME}/finance-tracker
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true